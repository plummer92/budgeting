<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Connect Your Bank</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0; background: #f0f2f6;
    }
    .card {
      background: white; border-radius: 16px; padding: 40px;
      text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 420px; width: 90%;
    }
    h2 { margin-bottom: 8px; color: #1a1a2e; }
    p  { color: #666; margin-bottom: 28px; line-height: 1.5; }
    button {
      background: #4CAF50; color: white; border: none;
      padding: 14px 32px; font-size: 16px; border-radius: 8px;
      cursor: pointer; font-weight: bold; width: 100%;
    }
    button:hover { background: #43a047; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status { margin-top: 16px; color: #666; font-size: 14px; min-height: 20px; }
    #error  { margin-top: 16px; color: red;  font-size: 13px; display: none; }
    .lock   { font-size: 12px; color: #999; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>&#127974; Connect Your Bank</h2>
    <p>Your login credentials go directly to your bank.<br>We only ever receive a secure token.</p>
    <button id="btn" onclick="openLink()" disabled>Loading...</button>
    <div id="status"></div>
    <div id="error"></div>
    <p class="lock">&#128274; 256-bit encryption &middot; Trusted by Venmo, Coinbase &amp; Robinhood</p>
  </div>

  <script>
    var params     = new URLSearchParams(window.location.search);
    var linkToken  = params.get('link_token');
    var returnUrl  = params.get('return_url');

    function showError(msg) {
      var el = document.getElementById('error');
      el.innerText = 'Error: ' + msg;
      el.style.display = 'block';
      document.getElementById('btn').disabled = false;
      document.getElementById('btn').innerText = 'Try Again';
    }

    if (!linkToken) {
      showError('Missing link token. Please go back to the app and try again.');
    } else {
      var script = document.createElement('script');
      script.src = 'https://cdn.plaid.com/link/v2/stable/link-initialize.js';
      script.onload = function() {
        document.getElementById('btn').disabled = false;
        document.getElementById('btn').innerText = 'Launch Bank Login';
        document.getElementById('status').innerText = 'Ready!';
        setTimeout(openLink, 600);
      };
      script.onerror = function() {
        showError('Could not load Plaid. Check your internet connection.');
      };
      document.head.appendChild(script);
    }

    function openLink() {
      if (typeof Plaid === 'undefined') {
        showError('Plaid not loaded yet. Please click Try Again.');
        return;
      }
      document.getElementById('btn').disabled = true;
      document.getElementById('status').innerText = 'Opening secure bank login...';
      try {
        var handler = Plaid.create({
          token: linkToken,
          onSuccess: function(publicToken, metadata) {
            document.getElementById('status').innerText = 'Bank linked! Returning to app...';
            var dest = new URL(returnUrl || window.location.href);
            dest.searchParams.set('plaid_public_token', publicToken);
            window.location.href = dest.toString();
          },
          onExit: function(err, metadata) {
            document.getElementById('btn').disabled = false;
            document.getElementById('btn').innerText = 'Launch Bank Login';
            if (err) {
              showError(err.display_message || err.error_message || 'Something went wrong.');
            } else {
              document.getElementById('status').innerText = 'Cancelled. Click the button to try again.';
            }
          }
        });
        handler.open();
      } catch(e) {
        showError('Failed to open Plaid Link: ' + e.message);
      }
    }
  </script>
</body>
</html>
